[tasks.bench-pretty]
description = "Full-suite human-readable benchmark report"
shell = "bash -c"
run = '''
set -euo pipefail
BENCH_CASE=all \
BENCH_BUDGET=1000000 \
BENCH_REPEAT=7 \
BENCH_WARMUP=2 \
BENCH_THREADS=0 \
BENCH_CUDA=both \
BENCH_FORMAT=pretty \
BENCH_COLOR=always \
BENCH_MIN_RATIO=1.0 \
mise run bench-compare
'''

[tasks.check-rust]
description = "Run Rust format, clippy, tests, DLL validation, and benchmark smoke"
shell = "bash -c"
run = '''
set -euo pipefail
mise run fmt-rust-check
mise run clippy-rust
mise run doc-rust
mise run test-rust
mise run check-rust-dll
mise run build-harness

rust_artifact="$TARGET_DIR/rust/$DLL"
rust_target="${RUST_TARGET:-x86_64-pc-windows-gnu}"
harness="$HEX_DIR/target/$rust_target/release/hex_dll_harness.exe"

smoke_bench() {
  bench_case="$1"
  bench_budget="$2"

  echo "Benchmarking Rust $DLL smoke: $bench_case"
  wine "$harness" bench \
    --dll "$(winepath -w "$(readlink -f "$rust_artifact")")" \
    --case "$bench_case" \
    --budget "$bench_budget" \
    --threads "${BENCH_THREADS:-0}" \
    --repeat 1 \
    --warmup "${BENCH_WARMUP:-1}" \
    --cuda both \
    --format "${BENCH_FORMAT:-pretty}" \
    --color "${BENCH_COLOR:-auto}"
}

smoke_bench tag-hit 1000
smoke_bench ux-tag-soul-pack 20000
'''

[tasks.check]
description = "Run Lua lint, lifecycle smoke, and the Rust DLL validation gate"
shell = "bash -c"
run = '''
set -euo pipefail
mise run lint-lua
mise run test-lua
mise run check-rust
'''

[tasks.test-lua]
description = "Run mocked Lua module, frame, and status-text lifecycle smoke"
shell = "bash -c"
run = '''
set -euo pipefail
luajit tests/lua_lifecycle_smoke.lua "$(pwd)"
luajit tests/lua_ui_smoke.lua "$(pwd)"
'''

[tasks.format]
description = "Format Lua and Rust"
shell = "bash -c"
run = '''
set -euo pipefail
lua_files=(Brainstorm.lua UI.lua steamodded_compat.lua tests/lua_lifecycle_smoke.lua tests/lua_ui_smoke.lua)
stylua "${lua_files[@]}"
cargo fmt --manifest-path "$HEX_DIR/Cargo.toml"
'''

[tasks.lint-lua]
description = "Check Lua formatting, bytecode syntax, luacheck, and version metadata"
shell = "bash -c"
run = '''
set -euo pipefail
export PATH="$HOME/.luarocks/bin:$PATH"
lua_files=(Brainstorm.lua UI.lua steamodded_compat.lua)
test_lua_files=(tests/lua_lifecycle_smoke.lua tests/lua_ui_smoke.lua)
syntax_lua_files=("${lua_files[@]}" "${test_lua_files[@]}")
luacheck_files=("${lua_files[@]}" "${test_lua_files[@]}")

command -v stylua >/dev/null || { echo "stylua not found. Install Stylua, then run: mise run doctor"; exit 1; }
command -v luajit >/dev/null || { echo "luajit not found. Install LuaJIT, then run: mise run doctor"; exit 1; }
command -v luacheck >/dev/null || { echo "luacheck not found. Run: mise run setup-lua"; exit 1; }

stylua --check "${lua_files[@]}" "${test_lua_files[@]}"
for lua_file in "${syntax_lua_files[@]}"; do
  luajit -b "$lua_file" /dev/null
done
luacheck "${luacheck_files[@]}"
mise run check-version
'''

[tasks.lint-rust]
description = "Check Rust formatting plus host and Windows clippy and documentation"
shell = "bash -c"
run = '''
set -euo pipefail
mise run fmt-rust-check
mise run clippy-rust
mise run doc-rust
'''

[tasks.lint]
description = "Check Lua and Rust formatting/lints"
shell = "bash -c"
run = '''
set -euo pipefail
mise run lint-lua
mise run lint-rust
'''

[tasks.stage-payload]
description = "Stage the Brainstorm OVERHAULED install payload under target/package/Brainstorm"
shell = "bash -c"
run = '''
set -euo pipefail
version_number="$(sed -n 's/^version = "\([^"]*\)"/\1/p' lovely.toml | head -n1)"
stage_root="$TARGET_DIR/package"
stage_dir="$stage_root/Brainstorm"
rust_artifact="$TARGET_DIR/rust/$DLL"

[ -n "$version_number" ] || {
  echo "lovely.toml manifest version is missing"
  exit 1
}
[ -f "$rust_artifact" ] || mise run build-rust

rm -rf "$stage_root"
mkdir -p "$stage_dir"
cp Brainstorm.lua UI.lua lovely.toml steamodded_compat.lua LICENSE NOTICE.md "$stage_dir"/
cp "$rust_artifact" "$stage_dir/$DLL"
sed -i -E '0,/^dump_lua = .*/s//dump_lua = false/' "$stage_dir/lovely.toml"
printf '%s\n' "$version_number" > "$stage_dir/VERSION"
'''

[tasks.release]
description = "Build, validate, and package release zip"
shell = "bash -c"
run = '''
set -euo pipefail
mise run check
mise run stage-payload

version_number="$(sed -n 's/^version = "\([^"]*\)"/\1/p' lovely.toml | head -n1)"
package_dir="Brainstorm"
package_zip="Brainstorm_OVERHAULED_v$version_number.zip"
stage_dir="$TARGET_DIR/package/$package_dir"
release_dir="release/$package_dir"
rust_artifact="$TARGET_DIR/rust/$DLL"

rm -rf release
mkdir -p release
cp -a "$stage_dir" "$release_dir"
zip_path="release/$package_zip"
command -v zip >/dev/null || { echo "zip not found"; exit 1; }
command -v unzip >/dev/null || { echo "unzip not found"; exit 1; }
(cd release && zip -r "$package_zip" "$package_dir" >/dev/null)
test -s "$zip_path"

expected_manifest="$(
  printf '%s\n' \
    Brainstorm/ \
    Brainstorm/Brainstorm.lua \
    Brainstorm/Hex.dll \
    Brainstorm/LICENSE \
    Brainstorm/NOTICE.md \
    Brainstorm/UI.lua \
    Brainstorm/VERSION \
    Brainstorm/lovely.toml \
    Brainstorm/steamodded_compat.lua | sort
)"
actual_manifest="$(unzip -Z1 "$zip_path" | sort)"
[ "$actual_manifest" = "$expected_manifest" ] || {
  echo "unexpected release archive contents:"
  printf '%s\n' "$actual_manifest"
  exit 1
}
[ "$(unzip -p "$zip_path" Brainstorm/VERSION)" = "$version_number" ] || {
  echo "packaged VERSION does not match $version_number"
  exit 1
}
unzip -p "$zip_path" Brainstorm/lovely.toml | grep -Fx 'dump_lua = false' >/dev/null || {
  echo "packaged lovely.toml must disable Lua dumping"
  exit 1
}
packaged_dll_hash="$(unzip -p "$zip_path" Brainstorm/Hex.dll | sha256sum | awk '{print $1}')"
built_dll_hash="$(sha256sum "$rust_artifact" | awk '{print $1}')"
[ "$packaged_dll_hash" = "$built_dll_hash" ] || {
  echo "packaged Hex.dll differs from $rust_artifact"
  exit 1
}
echo "created $zip_path"
'''

[tasks.publish-release]
description = "Build locally and publish an immutable GitHub release without CI"
shell = "bash -c"
run = '''
set -euo pipefail
for command_name in gh git sha256sum unzip; do
  command -v "$command_name" >/dev/null || {
    echo "$command_name not found"
    exit 1
  }
done
gh auth status --hostname github.com >/dev/null
[ "$(gh api 'repos/{owner}/{repo}/immutable-releases' --jq .enabled)" = "true" ] || {
  echo "GitHub release immutability must be enabled"
  exit 1
}
[ "$(git branch --show-current)" = "master" ] || {
  echo "publish-release must run from master"
  exit 1
}
git diff --quiet -- && git diff --cached --quiet -- || {
  echo "tracked files must be committed before publishing"
  exit 1
}

mise run check-version
version_number="$(sed -n 's/^version = "\([^"]*\)"/\1/p' lovely.toml | head -n1)"
release_tag="v$version_number"
package_zip="Brainstorm_OVERHAULED_v$version_number.zip"
zip_path="release/$package_zip"

git fetch --quiet origin master
head_commit="$(git rev-parse HEAD)"
[ "$head_commit" = "$(git rev-parse origin/master)" ] || {
  echo "local master must exactly match origin/master"
  exit 1
}
existing_release_state="$(
  gh release view "$release_tag" --json isDraft --jq .isDraft 2>/dev/null || printf 'none\n'
)"
if [ "$existing_release_state" = "false" ]; then
  echo "published release $release_tag already exists; releases are immutable"
  exit 1
fi

"${NVCC:-nvcc}" --version | grep -F 'V12.4' >/dev/null || {
  echo "production releases require CUDA Toolkit 12.4"
  exit 1
}
[ "$("${CUDAHOSTCXX:-gcc-12}" -dumpversion | cut -d. -f1)" = "12" ] || {
  echo "production releases require GCC 12 as the CUDA host compiler"
  exit 1
}
"${CUOBJDUMP:-cuobjdump}" --version | grep -F 'V12.4' >/dev/null || {
  echo "production releases require CUDA cuobjdump 12.4"
  exit 1
}

BRAINSTORM_CUDA_ARCHES=50,52,60,61,70,75,80,86,89,90 \
BRAINSTORM_CUDA_PTX_ARCH=89 \
BRAINSTORM_CUDA_PRODUCTION=1 \
mise run release

(cd release && sha256sum "$package_zip" > SHA256SUMS.txt)
(cd release && sha256sum --check --strict SHA256SUMS.txt)

git fetch --quiet origin master
[ "$(git rev-parse HEAD)" = "$head_commit" ] \
  && [ "$(git rev-parse origin/master)" = "$head_commit" ] \
  && git diff --quiet -- \
  && git diff --cached --quiet -- || {
  echo "HEAD, tracked files, or origin/master changed during the release build"
  exit 1
}

validate_local_tag() {
  [ "$(git cat-file -t "refs/tags/$release_tag")" = "tag" ] || {
    echo "$release_tag must be an annotated tag"
    exit 1
  }
  [ "$(git rev-parse "$release_tag^{}")" = "$head_commit" ] || {
    echo "$release_tag does not point to HEAD"
    exit 1
  }
}

remote_tags="$(git ls-remote --tags origin "refs/tags/$release_tag" "refs/tags/$release_tag^{}")"
if [ -z "$remote_tags" ]; then
  if ! git rev-parse --verify --quiet "refs/tags/$release_tag" >/dev/null; then
    git tag --annotate "$release_tag" --message "Brainstorm OVERHAULED $release_tag"
  fi
  validate_local_tag
  git push origin "refs/tags/$release_tag"
else
  if ! git rev-parse --verify --quiet "refs/tags/$release_tag" >/dev/null; then
    git fetch --quiet origin "refs/tags/$release_tag:refs/tags/$release_tag"
  fi
  validate_local_tag
  remote_tag_object="$(printf '%s\n' "$remote_tags" | awk '!/\^\{\}$/ {print $1}')"
  remote_commit="$(printf '%s\n' "$remote_tags" | awk '/\^\{\}$/ {print $1}')"
  [ "$remote_tag_object" = "$(git rev-parse "refs/tags/$release_tag")" ] || {
    echo "remote $release_tag differs from the local annotated tag"
    exit 1
  }
  [ "$remote_commit" = "$head_commit" ] || {
    echo "remote $release_tag is not the annotated tag for HEAD"
    exit 1
  }
fi

if [ "$existing_release_state" = "true" ]; then
  [ "$(gh release view "$release_tag" --json isDraft --jq .isDraft)" = "true" ] || {
    echo "release $release_tag changed while the package was building"
    exit 1
  }
  echo "discarding incomplete draft release $release_tag"
  gh release delete "$release_tag" --yes
fi

gh release create "$release_tag" "$zip_path" release/SHA256SUMS.txt \
  --draft \
  --verify-tag \
  --title "Brainstorm OVERHAULED $release_tag" \
  --notes-file - <<EOF
Brainstorm OVERHAULED production release.

Requirements: 64-bit Windows Balatro with Lovely and Steamodded installed.

- Lovely: https://github.com/ethangreen-dev/lovely-injector
- Steamodded: https://github.com/Steamodded/smods/wiki/Installing-Steamodded-windows#step-3-installing-steamodded

Experimental CUDA acceleration is included but disabled by default. Enable it
in the mod settings on a compatible NVIDIA GPU. It requires no CUDA Toolkit or
custom files and falls back to CPU automatically when unavailable or
unsupported.

Brainstorm OVERHAULED is KRVH's full rewrite of OceanRamen's original
Brainstorm. Hex is KRVH's Rust rewrite of the core seed-search engine from
MathIsFun0's original Immolate, source-verified against Balatro and extended
for Brainstorm.

Install:

1. Under Assets, download $package_zip—not GitHub's Source code archives.
2. Extract its included Brainstorm folder into %AppData%\Balatro\Mods\.
3. Reload Balatro.
EOF

verify_dir="$(mktemp -d /tmp/brainstorm-release-verify-XXXXXX)"
trap 'rm -rf "$verify_dir"' EXIT
gh release download "$release_tag" --dir "$verify_dir"
expected_assets="$(printf '%s\n' SHA256SUMS.txt "$package_zip" | sort)"
actual_assets="$(find "$verify_dir" -maxdepth 1 -type f -printf '%f\n' | sort)"
[ "$actual_assets" = "$expected_assets" ] || {
  echo "unexpected downloaded release assets:"
  printf '%s\n' "$actual_assets"
  exit 1
}
(cd "$verify_dir" && sha256sum --check --strict SHA256SUMS.txt)
[ "$(unzip -p "$verify_dir/$package_zip" Brainstorm/VERSION)" = "$version_number" ] || {
  echo "downloaded package VERSION does not match $version_number"
  exit 1
}

gh release edit "$release_tag" --draft=false --latest
[ "$(gh release view "$release_tag" --json isDraft --jq .isDraft)" = "false" ]
[ "$(gh api 'repos/{owner}/{repo}/releases/latest' --jq .tag_name)" = "$release_tag" ]
echo "published Brainstorm OVERHAULED $release_tag"
'''

[tasks.deploy]
description = "Build, validate, and copy the mod to TARGET"
shell = "bash -c"
run = '''
set -euo pipefail
mise run check
mise run stage-payload

resolve_target() {
  if [ -n "${TARGET:-}" ]; then
    printf '%s\n' "$TARGET"
    return
  fi
  if command -v powershell.exe >/dev/null && command -v wslpath >/dev/null; then
    appdata="$(powershell.exe -NoProfile -Command '[Environment]::GetFolderPath("ApplicationData")' | tr -d '\r' | tail -n1)"
    if [ -n "$appdata" ]; then
      wslpath "$appdata/Balatro/Mods/Brainstorm"
      return
    fi
  fi
  echo "Set TARGET to your Balatro Mods/Brainstorm directory." >&2
  exit 1
}

target="$(resolve_target)"
stage_dir="$TARGET_DIR/package/Brainstorm"

if [ "$(basename "$target")" != "Brainstorm" ]; then
  echo "TARGET must end with /Brainstorm: $target"
  exit 1
fi

echo "Deploying to $target"
mkdir -p "$target"
rsync -a --delete "$stage_dir"/ "$target"/
'''

[tasks.clean]
description = "Remove build and release artifacts"
run = "rm -rf Hex/target release target && rm -f Hex.dll"
